# Template: deploy workflow for review-rate-and-react (public review submission).
#
# WHERE THIS FILE GOES
#   Copy to:   .github/workflows/deploy.yml  in the review-rate-and-react repo.
#
# ONE-TIME SETUP IN THE FRONTEND REPO
#   1. Create two GitHub Environments under repo Settings -> Environments:
#        - "dev"  (no required reviewers)
#        - "prod" (REQUIRED reviewers = repo collaborators with write access)
#   2. In each Environment, add a secret named AWS_DEPLOY_ROLE_ARN.
#      Values are CFN outputs from the infra repo:
#        dev:  RateAndReact-Dev-CiDeploy.UserDeployRoleArn
#        prod: RateAndReact-Prod-CiDeploy.UserDeployRoleArn  (when prod is provisioned)
#   Note: the IAM role is named "user-deploy" because the AssetsStack uses
#   "user" as the internal key for this app (review submission is the public
#   user-facing site). The role itself is correctly scoped to the review bucket.
#
#   3. App build config (the VITE_* vars). The local .env.development /
#      .env.production files are gitignored, so CI must supply them. In EACH
#      Environment add these (Settings -> Environments -> <env>):
#
#        Environment VARIABLES (non-secret):
#          VITE_APP_STAGE          dev: production            prod: production
#          VITE_APP_BASE_URL       dev: /rateandreactapi/dev/user/   prod: /
#          VITE_APP_API_URL        dev: /api-proxy/           prod: (empty)
#          VITE_APP_API_TARGET     dev: https://api.dev.rateandreact.com/   prod: (empty)
#          VITE_APP_API_TOKEN      dev: (empty)               prod: (empty)
#
#        Environment SECRET:
#          VITE_APP_ENCRYPT_KEY    (the crypto key; same value used in both .env files)
#
#      The "Generate .env file" step below writes these into .env.<mode> before
#      the build so Vite's loadEnv() picks them up exactly like a local build.
#      NOTE: VITE_* values are compiled into the public JS bundle, so none of
#      them are truly private — VITE_APP_ENCRYPT_KEY is kept as a secret only to
#      avoid committing it to the repo, not because it stays hidden at runtime.
#
# WHAT IT DOES
#   - Push to main         -> auto-deploys to dev.
#   - workflow_dispatch    -> deploys to dev or prod (prod prompts approvers).
#   - Reads bucket + distribution IDs from the env's AssetsStack CFN outputs
#     so this file never hardcodes them.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        required: true
        default: dev
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    timeout-minutes: 15

    env:
      AWS_REGION: us-east-2
      ASSETS_OUTPUT_BUCKET_KEY: UserBucketName
      ASSETS_OUTPUT_DISTRIBUTION_KEY: UserDistributionId

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate .env file
        env:
          VITE_APP_STAGE: ${{ vars.VITE_APP_STAGE }}
          VITE_APP_BASE_URL: ${{ vars.VITE_APP_BASE_URL }}
          VITE_APP_API_URL: ${{ vars.VITE_APP_API_URL }}
          VITE_APP_API_TARGET: ${{ vars.VITE_APP_API_TARGET }}
          VITE_APP_API_TOKEN: ${{ vars.VITE_APP_API_TOKEN }}
          VITE_APP_ENCRYPT_KEY: ${{ secrets.VITE_APP_ENCRYPT_KEY }}
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [ "$ENV" = "prod" ]; then MODE="production"; else MODE="development"; fi
          # Values come from the GitHub Environment, written via env vars (not
          # inline interpolation) so secrets stay masked and special characters
          # survive intact.
          {
            echo "VITE_APP_STAGE=${VITE_APP_STAGE}"
            echo "VITE_APP_BASE_URL=${VITE_APP_BASE_URL}"
            echo "VITE_APP_ENCRYPT_KEY=${VITE_APP_ENCRYPT_KEY}"
            echo "VITE_APP_API_URL=${VITE_APP_API_URL}"
            echo "VITE_APP_API_TARGET=${VITE_APP_API_TARGET}"
            echo "VITE_APP_API_TOKEN=${VITE_APP_API_TOKEN}"
          } > ".env.${MODE}"
          echo "Wrote .env.${MODE} for $ENV (values hidden)."

      - name: Build
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [ "$ENV" = "prod" ]; then
            npm run build:prod
          else
            npm run build
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve bucket and distribution from CFN outputs
        id: outputs
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          if [ "$ENV" = "prod" ]; then PREFIX="Prod"; else PREFIX="Dev"; fi
          STACK="RateAndReact-${PREFIX}-Assets"

          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='${ASSETS_OUTPUT_BUCKET_KEY}'].OutputValue" \
            --output text)
          DIST=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='${ASSETS_OUTPUT_DISTRIBUTION_KEY}'].OutputValue" \
            --output text)

          if [ -z "$BUCKET" ] || [ -z "$DIST" ]; then
            echo "::error::Could not resolve bucket or distribution from $STACK outputs."
            exit 1
          fi

          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution=$DIST" >> "$GITHUB_OUTPUT"
          echo "Bucket:        $BUCKET"
          echo "Distribution:  $DIST"

      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync dist/assets/ "s3://${{ steps.outputs.outputs.bucket }}/assets/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync index.html and root files (short cache)
        run: |
          aws s3 sync dist/ "s3://${{ steps.outputs.outputs.bucket }}/" \
            --delete \
            --exclude "assets/*" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront cache for index
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.distribution }}" \
            --paths "/index.html" "/"
